name: Rust CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: rust-lang/setup-rust@v1
        with:
          rust-version: stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run fmt check
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Build
        run: cargo build --verbose --all-targets --all-features

      - name: Test
        run: cargo test --verbose

      - name: Build for target
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p dist
          tar -czf dist/p2p-node-${{ matrix.os }}-${{ matrix.target }}.${{ matrix.archive }} \
            -C target/${{ matrix.target }}/release p2p-node
        shell: bash

      - name: Package Windows
        if: matrix.os == 'windows-latest'
        run: |
          mkdir dist
          powershell Compress-Archive -Path target\x86_64-pc-windows-msvc\release\p2p-node.exe -DestinationPath dist\p2p-node-${{ matrix.os }}-${{ matrix.target }}.${{ matrix.archive }}
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: p2p-node-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*